<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Counter — actjs</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 400px; margin: 4rem auto; padding: 1rem; }
    button { margin: 0.25rem; padding: 0.5rem 1rem; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; }
    button.primary { background: #0070f3; color: white; border-color: #0070f3; }
    button.danger { background: #e00; color: white; border-color: #e00; }
    p.count { font-size: 2rem; font-weight: bold; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="../../dist/actjs.iife.js"></script>
  <script>
    const { component, signal, computed, onMount, onDestroy, createApp, html } = actjs;

const Counter = component(() => {
  const [count, setCount] = signal(0);
  const doubled = computed(() => count() * 2);

  const increment = () => setCount(c => c + 1);
  const decrement = () => setCount(c => c - 1);
  const reset     = () => setCount(0);

  onMount(() => console.log('Counter mounted'));
  onDestroy(() => console.log('Counter destroyed, final count:', count()));

  return () => html`
    <section>
      <h1>actjs Counter</h1>
      <p class="count">${count()} (doubled: ${doubled()})</p>
      <div>
        <button onclick=${increment} class="primary">Increment</button>
        <button onclick=${reset}>Reset</button>
        <button onclick=${decrement} class="danger" disabled=${count() <= 0}>Decrement</button>
      </div>
    </section>
  `;
}, { hydrate: 'interactive' });

createApp('#root').mount(Counter);

   </script>
</body>
</html>
